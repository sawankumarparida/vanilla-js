<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MBA & Dev Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="text-align: right; padding: 20px;">
        <button id="theme-toggle">Switch to Dark Mode</button>
    </header>

    <main style="text-align: center; margin-top: 50px;">
        <h1>Task Generator</h1>
        <div id="task-display" style="font-size: 2rem; margin-bottom: 20px;">
            Click the button to get a task!
        </div>
        <button id="fetch-btn" class="main-btn">Fetch New Task</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
